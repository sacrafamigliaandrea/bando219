<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Planner PNRR — Intelligenze in dialogo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gd:#1B6D3F;--gm:#2A8B57;--gp:#E8F5E9;--gbg:#F1F8F2;--bl:#1565C0;--bll:#E3F2FD;--am:#F57F17;--all:#FFF8E1;--rd:#C62828;--rll:#FFEBEE;--g9:#1a1a1a;--g7:#444;--g5:#888;--g3:#ccc;--g1:#f5f5f5;--w:#fff;--r:8px;--f:'DM Sans',sans-serif;--fd:'DM Serif Display',serif}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--g1);color:var(--g9)}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--gd),var(--gm))}
.lc{background:var(--w);border-radius:16px;padding:44px 36px;width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.lc h1{font-family:var(--fd);font-size:22px;color:var(--gd)}.lc .su{font-size:12px;color:var(--g5);margin-bottom:24px}
.lc input{width:100%;padding:11px 14px;border:2px solid var(--g3);border-radius:var(--r);font-family:var(--f);font-size:14px;outline:none}
.lc input:focus{border-color:var(--gm)}.lc .lb{width:100%;margin-top:14px;padding:11px;border:none;border-radius:var(--r);background:var(--gd);color:var(--w);font-weight:700;font-size:14px;cursor:pointer}
.lerr{color:var(--rd);font-size:12px;margin-top:6px;display:none}
#app{display:none}
.top{background:var(--gd);color:var(--w);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top h1{font-family:var(--fd);font-size:15px}.top-r{display:flex;gap:5px}.tb{padding:4px 11px;border-radius:16px;border:1.5px solid rgba(255,255,255,.3);background:0;color:var(--w);font-family:var(--f);font-size:11px;font-weight:600;cursor:pointer}.tb:hover,.tb.on{background:rgba(255,255,255,.15);border-color:var(--w)}
.bar{display:flex;gap:6px;padding:10px 16px;background:var(--w);border-bottom:1px solid var(--g3);flex-wrap:wrap;align-items:center}
.bar label{font-size:10px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.3px}
.bar select{padding:3px 6px;border:1.5px solid var(--g3);border-radius:5px;font-family:var(--f);font-size:11px}
.ft{padding:3px 9px;border-radius:12px;border:1.5px solid var(--g3);background:var(--w);font-family:var(--f);font-size:10px;font-weight:700;cursor:pointer}
.ft.a{background:var(--gd);color:var(--w);border-color:var(--gd)}.ft.ab{background:var(--bl);color:var(--w);border-color:var(--bl)}.ft.aa{background:var(--am);color:var(--w);border-color:var(--am)}
.ct{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;padding:10px 16px;background:var(--w);border-bottom:1px solid var(--g3)}
.cx{padding:10px;border-radius:var(--r);border-left:3px solid var(--gd);background:var(--gbg)}.cx.w{border-left-color:var(--am);background:var(--all)}
.cx .cl{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--g5);font-weight:700}.cx .cv{font-size:20px;font-weight:700;color:var(--gd)}.cx.w .cv{color:var(--am)}.cx .cd{font-size:10px;color:var(--g5)}
.cal{padding:12px 16px}.mti{font-family:var(--fd);font-size:16px;color:var(--gd);margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--gp)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}.ch{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--g5);text-align:center;padding:4px 0}
.dy{min-height:72px;background:var(--w);border-radius:4px;padding:3px;border:1px solid var(--g3);cursor:pointer;overflow:hidden;transition:all .12s}
.dy:hover{border-color:var(--gm);box-shadow:0 2px 8px rgba(27,109,63,.1)}.dy.em{background:0;border-color:transparent;cursor:default;min-height:auto}.dy.em:hover{box-shadow:none}
.dy.we{background:#f7f7f7}.dy.fe{background:var(--rll)}.dy.hs{border-color:var(--gm);background:var(--gp)}
.dy .dn{font-size:10px;font-weight:700;color:var(--g7)}.dy .dw{font-size:7px;color:var(--g5)}
.sg{margin-top:2px;padding:1px 3px;border-radius:2px;font-size:7px;font-weight:700;line-height:1.2;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--w)}
.sg.la{background:var(--bl)}.sg.fo{background:var(--gd)}.sg.vi{background:var(--am)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}.ov.sh{display:flex}
.ml{background:var(--w);border-radius:12px;width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.ml-h{padding:14px 18px;border-bottom:1px solid var(--g3);display:flex;justify-content:space-between;align-items:center}.ml-h h2{font-size:14px;color:var(--gd)}
.ml-x{background:0;border:0;font-size:18px;cursor:pointer;color:var(--g5)}.ml-b{padding:14px 18px}.ml-f{padding:10px 18px;border-top:1px solid var(--g3);display:flex;gap:5px;justify-content:flex-end}
.fg{margin-bottom:8px}.fg label{display:block;font-size:10px;font-weight:700;color:var(--g7);margin-bottom:2px;text-transform:uppercase;letter-spacing:.2px}
.fg select,.fg input{width:100%;padding:7px 9px;border:1.5px solid var(--g3);border-radius:5px;font-family:var(--f);font-size:12px;outline:0}.fg select:focus,.fg input:focus{border-color:var(--gm)}
.bt{padding:7px 14px;border-radius:5px;font-family:var(--f);font-weight:700;font-size:11px;cursor:pointer;border:0}.bt-p{background:var(--gd);color:var(--w)}.bt-d{background:var(--rd);color:var(--w)}.bt-g{background:0;color:var(--g5);border:1.5px solid var(--g3)}
.tc{display:flex;gap:3px;margin-bottom:8px}.tcb{flex:1;padding:8px;border:2px solid var(--g3);border-radius:var(--r);background:var(--w);font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;text-align:center}
.tcb:hover{border-color:var(--gm)}.tcb.sf{border-color:var(--gd);background:var(--gp);color:var(--gd)}.tcb.sl{border-color:var(--bl);background:var(--bll);color:var(--bl)}.tcb.sv{border-color:var(--am);background:var(--all);color:var(--am)}
.es{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:4px;margin-bottom:3px;font-size:11px}
.es.lb{background:var(--bll)}.es.fb{background:var(--gp)}.es.vb{background:var(--all)}
.bnd{padding:16px}.bnd iframe{width:100%;height:calc(100vh - 130px);border:0;border-radius:var(--r)}
.rp{padding:12px 16px}.plb{display:flex;justify-content:space-between;font-size:10px;color:var(--g5)}.pb{height:5px;background:var(--g3);border-radius:3px;overflow:hidden;margin:3px 0 10px}.pf{height:100%;border-radius:3px}.pf.g{background:var(--gd)}.pf.b{background:var(--bl)}
.ld{text-align:center;padding:40px;color:var(--g5);font-size:13px}
@media(max-width:768px){.cg{gap:1px}.dy{min-height:50px;padding:2px}.dy .dn{font-size:8px}.sg{font-size:6px}.ct{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<div id="login"><div class="lc"><h1>Intelligenze in dialogo</h1><p class="su">Planner PNRR 2026/2027</p><input type="password" id="pwd" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"><button class="lb" onclick="doLogin()">Accedi</button><p class="lerr" id="lerr">Password errata</p></div></div>
<div id="app">
<div class="top"><h1>Intelligenze in dialogo</h1><div class="top-r"><button class="tb on" onclick="showTab('calendar',this)">Calendario</button><button class="tb" onclick="showTab('riep',this)">Riepilogo</button><button class="tb" onclick="showTab('bando',this)">Bando</button></div></div>
<div class="bar" id="bar"><label>Mostra:</label><button class="ft a" id="ff" onclick="tgF('frm')">Formazione</button><button class="ft ab" id="fl" onclick="tgF('lab')">Laboratori</button><button class="ft aa" id="fv" onclick="tgF('vnc')">Vincoli</button><label style="margin-left:10px">Sede:</label><select id="fs" onchange="render()"><option value="all">Tutte</option><option value="OZ">Orzinuovi</option><option value="MT">Martinengo</option></select></div>
<div class="ct" id="ctr"></div>
<div id="tc" class="cal"></div>
<div id="tr" class="rp" style="display:none"></div>
<div id="tb" class="bnd" style="display:none"><iframe id="bif"></iframe></div>
</div>
<div class="ov" id="ov" onclick="if(event.target===this)cMo()"><div class="ml"><div class="ml-h"><h2 id="mt"></h2><button class="ml-x" onclick="cMo()">&times;</button></div><div class="ml-b" id="mb"></div><div class="ml-f" id="mf"></div></div></div>
<script>
const U="https://script.google.com/macros/s/AKfycbwzr325G0oT0IUGvgVeTcPAx-JV4iH1LQQlZ7IBYkf2WXXS2xwBy7BDkkWlDMGnODmY/exec";
const HP=108,HL=144,HT=252,TGT=50;
const ED=['P-A1','P-A2','P-A3','P-A4','P-A5','P-A6','L-B1','L-B2','L-B3','L-B4','L-B5','L-B6'];
const MOD=['Presenza','Online sincrono','Mista'];
const VT=['Collegio docenti','Consiglio di classe','Consiglio interclasse','Scrutini','Ricevimento genitori','Uscita didattica','Assemblea/Riunione','Festa/Evento','Altro impegno'];
const AMB=['Pri. OZ','Sec. OZ','Pri. MT','Sec. MT','Generale'];
const INS=['Cerioli','Prof.ssa Ferraboschi'];
const GH=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const GN=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MN=['','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const FE={'2026-06-02':'Festa Repubblica','2026-08-15':'Ferragosto','2026-11-01':'Ognissanti','2026-12-08':'Immacolata'};

let slots=[];
let flt={frm:true,lab:true,vnc:true};
let loading=true;

function doLogin(){if(document.getElementById('pwd').value==='Forma2026'){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';sessionStorage.setItem('pa','1');loadData()}else{let e=document.getElementById('lerr');e.style.display='block';setTimeout(()=>e.style.display='none',2000)}}
if(sessionStorage.getItem('pa')==='1'){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';setTimeout(loadData,50)}

function loadData(){loading=true;document.getElementById('tc').innerHTML='<div class="ld">Caricamento dati...</div>';
let s=document.createElement('script');s.src=U+'?action=get_all&callback=onData&_='+Date.now();s.onerror=function(){loading=false;slots=JSON.parse(localStorage.getItem('pnrr3')||'[]');render()};document.body.appendChild(s)}

window.onData=function(r){loading=false;if(r.status==='ok'&&r.data){slots=r.data.map(d=>({id:d.id,date:d.data,cat:d.cat,sub:d.sub,sede:d.sede,mod:d.mod,hours:Number(d.ore)||0,ed:d.ed,ndoc:d.ndoc,classe:d.classe,doc:d.doc,tutor:d.tutor,ambito:d.ambito,ins:d.ins,note:d.note}));localStorage.setItem('pnrr3',JSON.stringify(slots))}else{slots=JSON.parse(localStorage.getItem('pnrr3')||'[]')}render()};

function showTab(t,b){document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));if(b)b.classList.add('on');document.getElementById('tc').style.display=t==='calendar'?'block':'none';document.getElementById('tr').style.display=t==='riep'?'block':'none';document.getElementById('tb').style.display=t==='bando'?'block':'none';document.getElementById('bar').style.display=t==='calendar'?'flex':'none';if(t==='bando')document.getElementById('bif').src='Progetto.pdf';if(t==='riep')renderRiep()}
function tgF(t){flt[t]=!flt[t];let m={frm:['ff','a'],lab:['fl','ab'],vnc:['fv','aa']};let[id,cls]=m[t];document.getElementById(id).className=flt[t]?'ft '+cls:'ft';render()}
function dk(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function sfd(k){return slots.filter(s=>s.date===k)}
function hU(c){return slots.filter(s=>c?s.cat===c:true).reduce((a,s)=>a+(s.hours||0),0)}

function toS(slot){if(!U)return;let p=new URLSearchParams({action:'add',id:slot.id,data:slot.date,cat:slot.cat,sub:slot.sub||'',sede:slot.sede||'',mod:slot.mod||'',ore:slot.hours||'',ed:slot.ed||'',ndoc:slot.ndoc||'',classe:slot.classe||'',doc:slot.doc||'',tutor:slot.tutor||'',ambito:slot.ambito||'',ins:slot.ins||'',note:slot.note||''});new Image().src=U+'?'+p}
function delS(slot){if(!U)return;new Image().src=U+'?action=delete&id='+slot.id}

function renderCtr(){let hF=hU('formazione'),hL=hU('laboratorio'),hT=hF+hL,rF=HP-hF,rL=HL-hL,rT=HT-hT;
document.getElementById('ctr').innerHTML=`<div class="cx ${rT>0?'w':''}"><div class="cl">Ore totali</div><div class="cv">${hT}h / ${HT}h</div><div class="cd">${rT>0?'Mancano '+rT+'h':'Completato'}</div></div><div class="cx ${rF>0?'w':''}"><div class="cl">Percorsi (A)</div><div class="cv">${hF}h / ${HP}h</div><div class="cd">${rF>0?rF+'h':'OK'}</div></div><div class="cx ${rL>0?'w':''}"><div class="cl">Laboratori (B)</div><div class="cv">${hL}h / ${HL}h</div><div class="cd">${rL>0?rL+'h':'OK'}</div></div><div class="cx"><div class="cl">Sessioni</div><div class="cv">${slots.length}</div><div class="cd">Target: ${TGT} att.</div></div>`}

function renderCal(){let el=document.getElementById('tc');el.innerHTML='';let sede=document.getElementById('fs').value;
[[2026,6,1,30],[2026,7,1,31],[2026,8,1,31],[2026,9,1,30],[2026,10,1,31],[2026,11,1,30],[2026,12,1,23]].forEach(([y,m,s,e])=>{
let ti=document.createElement('h3');ti.className='mti';ti.textContent=MN[m]+' '+y;el.appendChild(ti);
let g=document.createElement('div');g.className='cg';GH.forEach(d=>{let h=document.createElement('div');h.className='ch';h.textContent=d;g.appendChild(h)});
let fd=new Date(y,m-1,s),st=fd.getDay();st=st===0?6:st-1;for(let i=0;i<st;i++){let x=document.createElement('div');x.className='dy em';g.appendChild(x)}
for(let d=s;d<=e;d++){let dt=new Date(y,m-1,d),dw=dt.getDay(),key=dk(y,m,d),ds=sfd(key),isW=dw===0||dw===6,isF=!!FE[key];
let vis=ds.filter(z=>{if(z.cat==='formazione'&&!flt.frm)return false;if(z.cat==='laboratorio'&&!flt.lab)return false;if(z.cat==='vincolo'&&!flt.vnc)return false;if(sede!=='all'&&z.sede&&!z.sede.includes(sede)&&z.sede!=='OZ+MT')return false;return true});
let c=document.createElement('div');c.className='dy'+(isF?' fe':isW?' we':'')+(vis.length?' hs':'');
let inn=`<div class="dn">${d}</div><div class="dw">${GN[dw]}</div>`;
if(isF)inn+=`<span class="sg vi">${FE[key]}</span>`;
vis.forEach(z=>{let cl=z.cat==='laboratorio'?'la':z.cat==='formazione'?'fo':'vi';let lb=z.cat==='laboratorio'?'LAB':z.cat==='formazione'?'FORM':'VNC';inn+=`<span class="sg ${cl}">${lb} ${z.sub||z.ambito||''} ${z.hours?z.hours+'h':''}</span>`});
c.innerHTML=inn;c.onclick=()=>openMo(key,d,MN[m],y);g.appendChild(c)}el.appendChild(g)})}

function openMo(key,day,mn,yr){let ex=sfd(key);document.getElementById('mt').textContent=day+' '+mn+' '+yr;
let h='';if(ex.length){h+='<div style="margin-bottom:10px">';ex.forEach(s=>{let bg=s.cat==='laboratorio'?'lb':s.cat==='formazione'?'fb':'vb';let lb=s.cat==='laboratorio'?'Laboratorio':s.cat==='formazione'?'Formazione':'Vincolo';let det=[s.sub,s.mod,s.hours?s.hours+'h':'',s.ambito,s.classe].filter(Boolean).join(' | ');h+=`<div class="es ${bg}"><div><strong>${lb}</strong> — ${det}</div><button onclick="delSlot('${s.id}')" style="background:0;border:0;color:var(--rd);cursor:pointer;font-size:14px">&times;</button></div>`});h+='</div>'}
h+=`<div class="tc"><button class="tcb" id="tf" onclick="sf('formazione')">Formazione</button><button class="tcb" id="tl" onclick="sf('laboratorio')">Laboratorio</button><button class="tcb" id="tv" onclick="sf('vincolo')">Vincolo</button></div><div id="sfm"></div>`;
document.getElementById('mb').innerHTML=h;document.getElementById('mf').innerHTML='<button class="bt bt-g" onclick="cMo()">Chiudi</button>';document.getElementById('ov').classList.add('sh');window._k=key}

function sf(t){document.querySelectorAll('.tcb').forEach(b=>b.className='tcb');document.getElementById(t==='formazione'?'tf':t==='laboratorio'?'tl':'tv').classList.add(t==='formazione'?'sf':t==='laboratorio'?'sl':'sv');
let h='';
